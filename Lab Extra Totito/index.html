<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio: Totito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container text-center mt-5">
        <h1 class="display-4 mb-4">Totito</h1>
        <div id="status" class="alert alert-primary h4">Turno de: X</div>
        
        <div class="board d-inline-grid mt-3">
            <div class="cell border bg-white display-4" data-index="0"></div>
            <div class="cell border bg-white display-4" data-index="1"></div>
            <div class="cell border bg-white display-4" data-index="2"></div>
            <div class="cell border bg-white display-4" data-index="3"></div>
            <div class="cell border bg-white display-4" data-index="4"></div>
            <div class="cell border bg-white display-4" data-index="5"></div>
            <div class="cell border bg-white display-4" data-index="6"></div>
            <div class="cell border bg-white display-4" data-index="7"></div>
            <div class="cell border bg-white display-4" data-index="8"></div>
        </div>

        <div class="mt-4">
            <button id="resetBtn" class="btn btn-dark btn-lg">Reiniciar Juego</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
